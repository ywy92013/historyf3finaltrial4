<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歷史終極戰役 - 溫習遊戲</title>
    <style>
        /* 戰爭 Online 遊戲風格 CSS */
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent-gold: #f1c40f;
            --accent-red: #e74c3c;
            --accent-green: #2ecc71;
            --text-color: #e0e0e0;
            --border-metal: #444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle, #2c3e50 0%, #121212 100%);
        }

        .game-container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            border: 3px solid #333;
            border-image: linear-gradient(to bottom, #bdc3c7, #2c3e50) 1;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            padding: 30px;
            border-radius: 4px;
            position: relative;
            z-index: 10;
        }

        /* 隱藏區塊 */
        .screen { display: none; }
        .screen.active { display: block; }

        /* 標題與字體 */
        h1, h2, h3 {
            color: var(--accent-gold);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        /* 登入介面 */
        .login-box {
            text-align: center;
            padding: 4px;
        }
        .login-box input {
            background: #2b2b2b;
            border: 2px solid var(--border-metal);
            color: #fff;
            padding: 12px 20px;
            font-size: 18px;
            border-radius: 5px;
            width: 80%;
            max-width: 300px;
            margin-bottom: 20px;
            text-align: center;
        }
        .login-box input:focus {
            border-color: var(--accent-gold);
            outline: none;
        }

        /* 按鈕風格 */
        .war-btn {
            background: linear-gradient(to bottom, #c0392b, #962d22);
            color: white;
            border: 1px solid #7f2219;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 4px 0 #5c1a13;
            transition: all 0.1s ease;
            text-transform: uppercase;
        }
        .war-btn:hover {
            background: linear-gradient(to bottom, #d35400, #b33921);
        }
        .war-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .war-btn:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* 遊戲頂部資訊欄 */
        .hud-bar {
            display: flex;
            justify-content: space-between;
            background: #151515;
            padding: 10px 15px;
            border-radius: 5px;
            border: 1px solid var(--border-metal);
            margin-bottom: 25px;
            font-size: 16px;
        }
        .hud-item span {
            color: var(--accent-gold);
            font-weight: bold;
        }

        /* 士氣條 (時間條) */
        .morale-container {
            width: 100%;
            background: #333;
            height: 15px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid #555;
        }
        .morale-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(to right, var(--accent-red), #f39c12);
            transition: width 0.1s linear;
        }

        /* 題目區 */
        .question-box {
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-left: 5px solid var(--accent-gold);
        }

        /* 選項區 */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .option-btn {
            background: #2c3e50;
            border: 1px solid #34495e;
            color: var(--text-color);
            padding: 15px;
            text-align: left;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .option-btn:hover:not([disabled]) {
            background: #34495e;
            border-color: var(--accent-gold);
        }
        
        /* 填充題輸入區 */
        .blank-input-box {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .blank-input-box input {
            flex: 1;
            background: #252525;
            border: 2px solid var(--border-metal);
            color: #fff;
            padding: 12px;
            font-size: 18px;
            border-radius: 5px;
        }
        .blank-input-box input:focus {
            border-color: var(--accent-gold);
            outline: none;
        }

        /* 即時反饋戰報面版 */
        .feedback-panel {
            margin-top: 25px;
            padding: 20px;
            border-radius: 5px;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .feedback-panel.victory {
            background: rgba(46, 204, 113, 0.15);
            border: 2px solid var(--accent-green);
        }
        .feedback-panel.defeat {
            background: rgba(231, 76, 60, 0.15);
            border: 2px solid var(--accent-red);
        }
        .feedback-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .victory .feedback-title { color: var(--accent-green); }
        .defeat .feedback-title { color: var(--accent-red); }
        
        .explanation-text {
            font-size: 15px;
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 15px;
        }

        /* 排行榜與戰報 */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: #1a1a1a;
        }
        .leaderboard-table th, .leaderboard-table td {
            padding: 12px;
            text-align: center;
            border: 1px solid #333;
        }
        .leaderboard-table th {
            background: #2c3e50;
            color: var(--accent-gold);
        }
        .player-row {
            background: rgba(241, 196, 15, 0.2) !important;
            font-weight: bold;
            outline: 2px solid var(--accent-gold);
        }

        /* 軍功簿 (總回顧) */
        .review-section {
            margin-top: 30px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }
        .review-item {
            background: #252525;
            border: 1px solid #444;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .review-header {
            padding: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }
        .review-header.correct { border-left: 5px solid var(--accent-green); }
        .review-header.wrong { border-left: 5px solid var(--accent-red); }
        
        .review-body {
            padding: 15px;
            background: #1c1c1c;
            border-top: 1px solid #333;
            display: none;
            font-size: 14px;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="game-container">
    
    <div id="screen-login" class="screen active">
        <h1>⚔️ 歷史終極戰役 ⚔️</h1>
        <p style="text-align:center; margin-bottom: 30px; color: #aaa;">輸入你的將領代號，率領軍隊進入歷史沙場！</p>
        <div class="login-box">
            <input type="text" id="player-name-input" placeholder="請輸入將領姓名/代號" maxlength="10" onkeydown="if(event.key === 'Enter') { event.preventDefault(); startGame(); }">
            <br>
            <button class="war-btn" onclick="startGame()">率軍出征</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="hud-bar">
            <div class="hud-item">將領：<span id="hud-name">-</span></div>
            <div class="hud-item">戰役進度：<span id="hud-progress">0 / 0</span></div>
            <div class="hud-item">當前軍功：<span id="hud-score">0</span></div>
        </div>

        <div class="morale-container">
            <div id="morale-bar" class="morale-bar"></div>
        </div>

        <div id="question-text" class="question-box">載入中...</div>

        <div id="mc-options-container" class="options-grid"></div>

        <div id="blank-input-container" style="display:none;">
            <div class="blank-input-box">
                <input type="text" id="blank-answer-field" placeholder="請輸入答案..." autocomplete="off" onkeydown="if(event.key === 'Enter') { event.preventDefault(); submitBlankAnswer(); }">
                <button class="war-btn" id="blank-submit-btn" onclick="submitBlankAnswer()">突擊扣關</button>
            </div>
        </div>

        <div id="feedback-panel" class="feedback-panel">
            <div id="feedback-title" class="feedback-title">大捷！</div>
            <div id="explanation-content" class="explanation-text"></div>
            <button class="war-btn" id="next-btn" onclick="goToNextQuestion()">進軍下一戰場</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h1>戰功大結算</h1>
        <h2 id="final-tier" style="font-size: 28px; color: var(--accent-gold); margin: 15px 0;">千古一帝</h2>
        <p style="text-align: center; font-size: 18px; margin-bottom: 5px;">最終軍功值：<span id="final-score" style="color:var(--accent-gold); font-weight:bold;">0</span></p>
        
        <p id="upload-status" style="text-align: center; font-size: 14px; color: #aaa; margin-bottom: 20px; font-style: italic;"></p>

        <h3>👑 將領軍功戰略榜</h3>
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>將領代號</th>
                    <th>最終軍功</th>
                    <th>總滿分</th>
                    <th>戰略評價</th>
                </tr>
            </thead>
            <tbody id="leaderboard-rows">
                </tbody>
        </table>

        <h3>📜 戰後軍功簿 (答題紀錄)</h3>
        <div id="review-list" class="review-section">
            </div>
        
        <div style="text-align: center; margin-top: 25px;">
            <button class="war-btn" onclick="location.reload()">重新集結整兵</button>
        </div>
    </div>

</div>

<script>
    // 錯誤捕獲機制，若瀏覽器出現語法錯誤會自動跳出警告
    window.onerror = function(message, source, lineno, colno, error) {
        alert("程式碼載入異常！\n錯誤: " + message + "\n行數: " + lineno);
    };

    const quizData = [
        { id: 1, type: "MC", q: "1. 第一次世界大戰爆發前，歐洲形成了兩大軍事集團。下列哪一組國家屬於由英、法、俄組成的「三國協約」（Triple Entente）？", options: ["A. 德國、奧匈帝國、意大利", "B. 英國、法國、俄國", "C. 美國、英國、中國", "D. 德國、日本、奧匈帝國"], ans: "B", exp: "戰前歐洲兩大陣營對立，德、奧、意組成「三國同盟」，而英、法、俄則組成「三國協約」。" },
        { id: 2, type: "MC", q: "2. 引致 1914 年 第一次世界大戰爆發的直接導火線是甚麼事件？", options: ["A. 德國發動閃電戰入侵波蘭", "B. 奧匈帝國皇儲法蘭茲·斐迪南大公在塞拉耶佛被普林西普刺殺", "C. 美國宣佈奉行孤立主義", "D. 俄國爆發共產革命退出戰爭"], ans: "B", exp: "1914 年 6 月 28 日發生的「塞拉耶佛事件」（皇儲被塞爾維亞民族主義少年普林西普刺殺）直接引爆了一戰。" },
        { id: 3, type: "MC", q: "3. 1947 年，美國總統杜魯門在國會發表歷史性演說，承諾援助任何受到共產主義威脅的自由國家。這項宣示標誌著冷戰的正式開始，史稱：", options: ["A. 馬歇爾計劃", "B. 杜魯門主義", "C. 莫洛托夫計劃", "D. 布里茲尼夫主義"], ans: "B", exp: "1947 年《杜魯門主義》（Truman Doctrine）的宣告，標誌著美國全面展開對共產主義的「圍堵政策」，冷戰正式拉開序幕。" },
        { id: 4, type: "MC", q: "4. 誰發動「十月革命」推翻當時的俄國政府，後建立蘇聯？", options: ["A. 列寧", "B. 赫魯曉夫", "C. 戈爾巴驕夫", "D. 史太林"], ans: "A", exp: "1917年列寧領導布爾什維克黨發動「十月革命」，推翻了俄國臨時政府，並於1922年正式建立蘇聯。" },
        { id: 5, type: "MC", q: "5. 在美國總統威爾遜倡議下，一戰後成立了人類歷史上第一個旨在通過國際合作解決糾紛的全球性維和組織，它是：", options: ["A. 聯合國", "B. 國際聯盟（國聯）", "C. 北大西洋公約組織", "D. 華沙公約組織"], ans: "B", exp: "1920 年成立的是「國際聯盟」；「聯合國」則是二戰後（1945年）成立的。" },
        { id: 6, type: "MC", q: "6. 一戰後德國成立了哪一個民主政府？但它因接納苛刻條約且未能解決嚴重的惡性通貨膨脹而大失民心，造就了希特拉的興起？", options: ["A. 威瑪共和國", "B. 德意志第三帝國", "C. 東德政府", "D. 波旁王朝"], ans: "A", exp: "1919年成立的「威瑪共和國」因無法解決戰後惡性通脹問題及接納《凡爾賽條約》而大失民心，給了納粹黨奪權的機會。" },
        { id: 7, type: "MC", q: "7. 1938 年的慕尼黑會議中，英、法為了維持表面和平，對希特拉侵略捷克斯洛伐克的行為採取了甚麼政策？", options: ["A. 圍堵政策", "B. 孤立政策", "C. 綏靖政策", "D. 積極不干預政策"], ans: "C", exp: "英法在戰前推行「綏靖政策」（Appeasement Policy），一味向極權侵略者妥協退讓，結果反而加速了二戰爆發。" },
        { id: 8, type: "MC", q: "8. 1949 年，美國與西歐等民主國家成立了哪一個軍事組織，以實施集體防禦、共同對抗蘇聯共產勢力的擴張？", options: ["A. 華沙公約組織", "B. 北大西洋公約組織（北約）", "C. 國際聯盟", "D. 歐洲經濟共同體"], ans: "B", exp: "1949年成立的「北大西洋公約組織（NATO）」是西方資本主義陣營的核心軍事同盟。" },
        { id: 9, type: "MC", q: "9. 在冷戰時期的亞洲戰場中，以下哪一場戰爭（1950-1953年）被視為東西方陣營之間第一場大規模的「熱戰」，並導致該半島至今維持分裂狀態？", options: ["A. 越南戰爭", "B. 韓戰", "C. 阿富汗戰爭", "D. 國共內戰"], ans: "B", exp: "韓戰是冷戰時期第一場大型的局部代理人戰爭（熱戰），聯合國軍與中國志願軍、北韓軍直接交戰，戰後南北韓維持分裂。" },
        { id: 10, type: "MC", q: "10. 1970 年代初，美蘇與中美關係迎來破冰契機。1972 年，哪位美國總統歷史性出訪中國，成為第一位到訪中華人民共和國的美國總統？", options: ["A. 杜魯門", "B. 尼克遜", "C. 甘迺迪", "D. 列根"], ans: "B", exp: "美國總統尼克遜（Nixon）於 1972 年訪華，打破了兩國自1949年以來的隔絕狀態，推動了後來 1979 年的中美建交。" },
        { id: 11, type: "MC", q: "11. 關於「冷戰」（1946-1991）的定義，下列哪項敘述是正確的？", options: ["A. 美蘇兩國在極地寒冷地區展開的領土爭奪戰", "B. 以蘇聯為首的共產陣營與以美國為首的資本陣營之間展開激烈對抗，但彼此沒有「直接」爆發全面戰爭", "C. 中國與美國在亞洲發生的直接軍事衝突", "D. 聯合國派遣維和部隊對抗東歐衛星國的戰爭"], ans: "B", exp: "冷戰的核心特點是「沒有直接的全面戰爭」，雙方透過軍備競賽、間諜、政治宣傳及代理人戰爭互相對抗。" },
        { id: 12, type: "MC", q: "12. 英國前首相邱吉爾在 1946 年發表著名演說，指出「一幅______已經降落在大陸（歐洲）上」，用以形容蘇聯對東歐的嚴密控制與封鎖？", options: ["A. 鐵幕（Iron Curtain）", "B. 竹幕（Bamboo Curtain）", "C. 柏林圍牆", "D. 衛星網"], ans: "A", exp: "邱吉爾在美國發表的「鐵幕演說」，形象地勾勒出歐洲被分裂為東西兩大陣營的冷戰現實。" },
        { id: 13, type: "MC", q: "13. 以下哪項不是冷戰的特點？", options: ["A. 進行軍備和太空競賽", "B. 利用罵戰及政治宣傳", "C. 進行間諜活動", "D. 殖民地衝突"], ans: "D", exp: "冷戰的非軍事對抗手段主要包括軍備/太空競賽、政治宣傳、間諜活動及局部代理人戰爭。「殖民地衝突」是19世紀帝國主義擴張的特點，並非冷戰的核心對抗手段。" },
        { id: 14, type: "MC", q: "14. 哪一個歷史事件被視為「冷戰期間最嚴重的危機」，當時美蘇兩國在古巴對峙，差點引發毀滅性的人類核子大戰？", options: ["A. 柏林封鎖（1948-1949）", "B. 韓戰爆發（1950）", "C. 古巴導彈危機（1962）", "D. 蘇聯入侵阿富汗（1979）"], ans: "C", exp: "1962年蘇聯在古巴秘密部署中程核導彈，美國實施海上封鎖，這是人類歷史上最接近全面核戰爭的一刻。" },
        { id: 15, type: "MC", q: "15. 1980 年代初，美國總統列根就任後推行強硬的反蘇政策，並啟動了俗稱「_______」的戰略防禦計劃，使美蘇關係再度惡化？", options: ["A. 施里芬計劃", "B. 星球大戰", "C. 莫洛托夫計劃", "D. 新思維"], ans: "B", exp: "總統列根於1983年啟動戰略防禦計劃（Strategic Defense Initiative），俗稱「星球大戰」計劃，令冷戰局勢再度趨向緊張。" },
        { id: 16, type: "MC", q: "16. 成立於1920年的國際聯盟（國聯）在維持世界和平方面存在重大局限。下列哪項是其無法阻止第二次世界大戰爆發的主要原因？", options: ["A. 全面拒絕發達國家的經濟貸款", "B. 面對1930年代極權國家的侵略束手無策", "C. 過度專注於全球暖化與環境保護議題", "D. 反對簽署任何戰後的國際合作原則"], ans: "B", exp: "國聯缺乏強大的軍事制裁力量與大國全力支持，當面對1930年代日本、德國與意大利等極權國家的侵略擴張時無法進行有效干預，最終導致國際秩序瓦解並爆發二戰。" },
        { id: 17, type: "MC", q: "17. 二十世紀以來，欠發達國家主要依賴出口農產品，面臨收入不穩的問題。為了推動國家發展，這些國家往往需要向發達國家借貸，結果導致負債不斷上升，容易陷入以下哪一種惡性循環？", options: ["A. 進口替代的循環", "B. 借貸與貧窮的循環", "C. 通貨膨脹的循環", "D. 殖民與掠奪的循環"], ans: "B", exp: "欠發達國家由於資源匱乏、資金不足，需向發達國家借貸以推動發展。然而，隨着負債不斷上升，其經濟增長有限，最終陷入「借貸與貧窮」的惡性循環，加劇了全球貧富差距。" },
        { id: 18, type: "MC", q: "18. 香港歷史上的哪一個突發事件發生於1953年，成為香港政府改變以往政策、開始積極介入興建公營房屋的重大轉折點？", options: ["A. 省港大罷工", "B. 石硤尾大火", "C. 全球經濟大衰退", "D. 海底隧道通車"], ans: "B", exp: "1953年聖誕夜爆發的石硤尾大火令數萬名木屋區災民痛失家園。以此為轉折點，殖民地政府改變了以往不干預居民房屋問題的態度，開始興建公營房屋（如早期的徙置大廈）來安置居民。" },
        { id: 19, type: "MC", q: "19. 1929年全球經濟大衰退爆發後，國際市場購買力銳減，香港進出口總值大幅下跌。為了應對危機，英聯邦國家於1932年簽署了哪項協議，使香港生產的貨品享有特惠稅，進而為本地工業的起步提供重要契機？", options: ["A. 《凡爾賽條約》", "B. 《大西洋憲章》", "C. 《渥太華協議》", "D. 《關稅暨貿易總協定》"], ans: "C", exp: "1932年簽署的《渥太華協議》為英聯邦成員實施了特惠稅安排。在該協議下，香港製造的貨品在英聯邦市場享有稅務優惠，吸引了資金投入本地製衣、電筒等輕工業，促成了戰前香港工業的萌芽。" },
        { id: 20, type: "MC", q: "20. 香港在第二次世界大戰後憑藉輕工業的蓬勃發展，成功轉型為工業中心。到了1960年代，香港與新加坡、台灣及韓國因經濟急速增長、成就矚目，在國際上被共同譽為什麼？", options: ["A. 金磚四國", "B. 亞洲四小龍", "C. 東盟四國", "D. 英聯邦四傑"], ans: "B", exp: "二戰後香港的製造業與外向型經濟取得巨大成功。到了1960年代，香港因卓越的經濟表現，與新加坡、台灣、韓國並列，被國際社會合稱為「亞洲四小龍」。" },
        
        { id: 21, type: "BLANK", q: "1. 二戰結束時，東歐多個國家（如波蘭、捷克等）建立了共產政權並受到蘇聯的嚴密控制，這些國家在歷史上被稱為蘇聯的「______」。", ans: ["衛星國", "衞星國"], exp: "東歐多國建立共產政權並由蘇聯牢牢掌控，在國際政治中常被謔稱為蘇聯的「衛星國」或「衞星國」。" },
        { id: 22, type: "BLANK", q: "2. 二戰結束後，美國由過去長期奉行的「______」轉變為積極投入國際事務，成為資本主義陣營的領袖。", ans: ["孤立政策", "孤立主義"], exp: "美國一戰後奉行孤立主義/孤立政策，但二戰結束後意識到共產主義擴張，全面轉向全面積極介入國際事務的圍堵政策。" },
        { id: 23, type: "BLANK", q: "3. 1947年，美國國務卿提出一項「歐洲復興計劃」，向飽受戰火摧殘的西歐國家提供龐大的經濟援助以防止其共產化，該計劃被稱為《______》。", ans: "馬歇爾計劃", exp: "《馬歇爾計劃》成功幫助西歐經濟復甦，建立了抵擋共產主義西進的堅固經濟屏障。" },
        { id: 24, type: "BLANK", q: "4. 1948年，蘇聯切斷了西柏林的所有水、陸路交通，企圖迫使西方盟軍撤出，史稱「______」。西方國家隨後展開了歷史上著名的大規模「空運」，源源不斷送入物資，成功化解危機。", ans: "柏林封鎖", exp: "「柏林封鎖」是冷戰早期的重大衝突，西方的柏林大空運粉碎了蘇聯的全面圍困圖謀。" },
        { id: 25, type: "BLANK", q: "5. 1949年，毛澤東宣佈 ______ 成立，標誌著共產主義勢力正式擴展至亞洲，這令美國感到極大恐慌，導致亞洲冷戰局勢加劇。", ans: "中華人民共和國", exp: "1949年10月1日中華人民共和國成立，亞洲冷戰中心隨即在不久後向遠東轉移。" }
    ];

    let playerName = "";
    let currentIndex = 0;
    let currentScore = 0;
    let userHistory = []; 

    let timeLeft = 30;
    const totalTimePerQuestion = 30; 
    let timerInterval = null;
    let isAnsweredThisQuestion = false;

    function startGame() {
        try {
            let nameInputElem = document.getElementById("player-name-input");
            let nameInput = nameInputElem ? nameInputElem.value.trim() : "";
            
            if (!nameInput) {
                nameInput = "無名將領"; 
            }
            
            playerName = nameInput;
            document.getElementById("hud-name").innerText = playerName;
            
            switchScreen("screen-game");
            currentIndex = 0;
            currentScore = 0;
            userHistory = [];
            
            loadQuestion();
        } catch (error) {
            console.error("啟動遊戲時發生錯誤: ", error);
            alert("遊戲啟動失敗，請檢查瀏覽器設定！");
        }
    }

    function loadQuestion() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        
        isAnsweredThisQuestion = false;
        timeLeft = totalTimePerQuestion;
        
        document.getElementById("feedback-panel").style.display = "none";
        document.getElementById("hud-progress").innerText = `${currentIndex + 1} / ${quizData.length}`;
        document.getElementById("hud-score").innerText = currentScore;
        updateMoraleBar();

        const currentQ = quizData[currentIndex];
        document.getElementById("question-text").innerText = currentQ.q;

        const mcContainer = document.getElementById("mc-options-container");
        const blankContainer = document.getElementById("blank-input-container");

        if (currentQ.type === "MC") {
            mcContainer.style.display = "grid";
            blankContainer.style.display = "none";
            
            mcContainer.innerHTML = "";
            currentQ.options.forEach(opt => {
                const letter = opt.charAt(0); 
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => selectMCOption(letter);
                mcContainer.appendChild(btn);
            });
        } else {
            mcContainer.style.display = "none";
            blankContainer.style.display = "block";
            const inputField = document.getElementById("blank-answer-field");
            inputField.value = "";
            inputField.disabled = false;
            document.getElementById("blank-submit-btn").disabled = false;
        }

        startTimer();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            if (timeLeft <= 0) {
                timeLeft = 0;
                clearInterval(timerInterval);
                timeOutTrigger();
            }
            updateMoraleBar();
        }, 100);
    }

    function updateMoraleBar() {
        const percentage = (timeLeft / totalTimePerQuestion) * 100;
        document.getElementById("morale-bar").style.width = percentage + "%";
    }

    function timeOutTrigger() {
        if (isAnsweredThisQuestion) return;
        isAnsweredThisQuestion = true;
        lockInputs();
        processAnswerResult(false, "時間耗盡！部隊未能及時突圍。", "");
    }

    function selectMCOption(selectedLetter) {
        if (isAnsweredThisQuestion) return; 
        isAnsweredThisQuestion = true;
        clearInterval(timerInterval); 
        lockInputs();

        const currentQ = quizData[currentIndex];
        const isCorrect = (selectedLetter === currentQ.ans);
        
        let earned = 0;
        if (isCorrect) {
            earned = 100 + Math.round((timeLeft / totalTimePerQuestion) * 100);
            currentScore += earned;
        }

        processAnswerResult(isCorrect, isCorrect ? `大捷！重創敵軍 (+${earned} 軍功)` : `失陷！落入敵方陷阱。`, selectedLetter);
    }

    function submitBlankAnswer() {
        if (isAnsweredThisQuestion) return;
        
        const userInput = document.getElementById("blank-answer-field").value.trim();
        if (!userInput) return;

        isAnsweredThisQuestion = true;
        clearInterval(timerInterval);
        lockInputs();

        const currentQ = quizData[currentIndex];
        let isCorrect = false;

        if (Array.isArray(currentQ.ans)) {
            isCorrect = currentQ.ans.some(ansVariant => userInput.toLowerCase() === ansVariant.toLowerCase());
        } else {
            isCorrect = (userInput.toLowerCase() === currentQ.ans.toLowerCase());
        }

        let earned = 0;
        if (isCorrect) {
            earned = 100 + Math.round((timeLeft / totalTimePerQuestion) * 100);
            currentScore += earned;
        }

        processAnswerResult(isCorrect, isCorrect ? `大捷！成功插旗扣關 (+${earned} 軍功)` : `失陷！此計不通。`, userInput);
    }

    function lockInputs() {
        const mcBtns = document.querySelectorAll(".option-btn");
        mcBtns.forEach(btn => btn.disabled = true);
        document.getElementById("blank-answer-field").disabled = true;
        document.getElementById("blank-submit-btn").disabled = true;
    }

    function processAnswerResult(isCorrect, titleText, userAns) {
        const currentQ = quizData[currentIndex];
        const displayAns = Array.isArray(currentQ.ans) ? currentQ.ans.join(" 或 ") : currentQ.ans;
        
        userHistory.push({
            qText: currentQ.q,
            type: currentQ.type,
            isCorrect: isCorrect,
            userAns: userAns || "無",
            correctAns: displayAns,
            timeUsed: (totalTimePerQuestion - timeLeft).toFixed(1),
            exp: currentQ.exp
        });

        const panel = document.getElementById("feedback-panel");
        panel.className = "feedback-panel " + (isCorrect ? "victory" : "defeat");
        document.getElementById("feedback-title").innerText = isCorrect ? "⚔️ " + titleText : "🛡️ " + titleText;
        
        document.getElementById("explanation-content").innerHTML = `
            <strong>正確答案：</strong> ${displayAns}<br><br>
            <strong>歷史脈絡：</strong><br>${currentQ.exp}
        `;
        
        panel.style.display = "block";
    }

    function goToNextQuestion() {
        currentIndex++;
        if (currentIndex < quizData.length) {
            loadQuestion();
        } else {
            showFinalResult();
        }
    }

    function showFinalResult() {
        switchScreen("screen-result");
        document.getElementById("final-score").innerText = currentScore;
        
        let tier = "";
        if (currentScore >= 4000) tier = "🎖️ 千古一帝・兵聖再世";
        else if (currentScore >= 3000) tier = "⚔️ 常勝將軍・百戰不殆";
        else if (currentScore >= 2000) tier = "🛡️ 開國校尉・威震一方";
        else if (currentScore >= 1000) tier = "🚩 百夫長・衝鋒陷陣";
        else tier = "🏹 新兵蛋子・有待磨練";
        
        document.getElementById("final-tier").innerText = tier;

        generateLeaderboard();
        generateReviewList();
        
        uploadDataToGoogleSheet(playerName, currentScore, tier.split("・")[0]);
    }

    function uploadDataToGoogleSheet(name, score, evaluation) {
        // ⚠️請把下方引號內的網址，替換成你在 Apps Script 得到的 Web App URL⚠️
        const scriptUrl = "https://script.google.com/macros/s/AKfycbx3NrCXlOvcYzqtTJithH9MuHlH76WHgVYhBRoTrgkKd8z85WWad-BBxGS27_pqamqt/exec"; 
        
        if (scriptUrl === "https://script.google.com/macros/s/AKfycbx3NrCXlOvcYzqtTJithH9MuHlH76WHgVYhBRoTrgkKd8z85WWad-BBxGS27_pqamqt/exec" || !scriptUrl) {
            console.log("未檢測到有效 Google Apps Script URL，跳過雲端數據同步。");
            document.getElementById("upload-status").innerText = "⚠️ 未設定雲端連線，無法同步戰功。";
            return;
        }
        
        const statusElem = document.getElementById("upload-status");
        statusElem.innerText = "🔄 正在將你的戰功同步到雲端將領榜...";
        
        const formData = new URLSearchParams();
        formData.append("name", name);
        formData.append("score", score);
        formData.append("evaluation", evaluation);
        
        fetch(scriptUrl, {
            method: "POST",
            mode: "no-cors", 
            body: formData
        })
        .then(() => {
            statusElem.innerText = "✅ 戰功已成功同步到雲端將領簿！";
            statusElem.style.color = "var(--accent-green)";
        })
        .catch(err => {
            console.error("同步失敗:", err);
            statusElem.innerText = "❌ 雲端同步失敗，請檢查網絡連線。";
            statusElem.style.color = "var(--accent-red)";
        });
    }

    function generateLeaderboard() {
        const tbody = document.getElementById("leaderboard-rows");
        tbody.innerHTML = "";
        
        const maxPossibleScore = quizData.length * 200; 
        const playerTier = document.getElementById("final-tier").innerText.split("・")[0];

        const tr = document.createElement("tr");
        tr.className = "player-row"; 
        tr.innerHTML = `
            <td>${playerName} (你)</td>
            <td><span style="color:var(--accent-gold); font-weight:bold;">${currentScore}</span></td>
            <td>${maxPossibleScore}</td>
            <td>${playerTier}</td>
        `;
        tbody.appendChild(tr);
    }

    function generateReviewList() {
        const container = document.getElementById("review-list");
        container.innerHTML = "";

        userHistory.forEach((item, idx) => {
            const wrapper = document.createElement("div");
            wrapper.className = "review-item";

            const header = document.createElement("div");
            header.className = `review-header ${item.isCorrect ? 'correct' : 'wrong'}`;
            header.innerHTML = `
                <span>${item.isCorrect ? '🟢【大捷】' : '🔴【失陷】'} 第 ${idx+1} 戰役</span>
                <span style="font-size:12px; color:#aaa;">展開戰報 ▽</span>
            `;

            const body = document.createElement("div");
            body.className = "review-body";
            body.innerHTML = `
                <p><strong>戰場原題：</strong>${item.qText}</p>
                <p><strong>你的決策：</strong> <span style="color:${item.isCorrect ? 'var(--accent-green)':'var(--accent-red)'}">${item.userAns}</span></p>
                <p><strong>正確軍令：</strong> <span style="color:var(--accent-gold)">${item.correctAns}</span></p>
                <p><strong>接敵時間：</strong> ${item.timeUsed} 秒</p>
                <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
                <p><strong>歷史脈絡解析：</strong><br>${item.exp}</p>
            `;

            header.onclick = () => {
                const isDisplayed = body.style.display === "block";
                body.style.display = isDisplayed ? "none" : "block";
                header.querySelector("span:last-child").innerText = isDisplayed ? "展開戰報 ▽" : "收合戰報 △";
            };

            wrapper.appendChild(header);
            wrapper.appendChild(body);
            container.appendChild(wrapper);
        });
    }

    function switchScreen(screenId) {
        document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
        document.getElementById(screenId).classList.add("active");
    }
</script>
